<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talk2Buy</title>

<style>

body{
 background:#001f3f;
 color:white;
 font-family:Arial;
 text-align:center;
 padding:40px;
}

h1{
 color:#ffd60a;
}

input{
 padding:10px;
 width:260px;
 margin:10px;
 border-radius:6px;
 border:none;
}

button{
 padding:12px 25px;
 border:none;
 border-radius:6px;
 margin:10px;
 font-size:15px;
 cursor:pointer;
}

.manual{
 background:#ff6b6b;
 color:white;
}

#manualBox{
 display:none;
}

</style>
</head>

<body>

<h1>Talk2Buy</h1>
<p>Voice Shopping</p>

<p>User ID (Auto Generated)</p>
<input id="userid" readonly>

<p>Say your Password</p>
<input id="password" type="text" placeholder="Speak password">

<div id="manualBox">
<button class="manual" onclick="manualRegister()">Register Manually</button>
</div>

<script>

let attempts=0;

function speak(text){
 return new Promise(resolve=>{
  let msg=new SpeechSynthesisUtterance(text);
  msg.onend=resolve;
  speechSynthesis.speak(msg);
 });
}

function listen(time=6000){
 return new Promise(resolve=>{

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
   resolve("");
   return;
  }

  const rec = new SpeechRecognition();
  rec.lang = "en-US";
  rec.interimResults = false;
  rec.maxAlternatives = 1;

  let finished = false;

  rec.onresult = e=>{
   finished = true;
   resolve(e.results[0][0].transcript.toLowerCase());
  };

  rec.onerror = ()=>{
   if(!finished) resolve("");
  };

  rec.onend = ()=>{
   if(!finished) resolve("");
  };

  rec.start();

  setTimeout(()=>{
   if(!finished){
    rec.stop();
    resolve("");
   }
  }, time);

 });
}
async function startRegister(){

 // generate random user id
 const userid="user"+Math.floor(Math.random()*10000);

 document.getElementById("userid").value=userid;

 await speak("Welcome to Talk2Buy");

await speak("Please say your password");

// small delay 
await new Promise(r => setTimeout(r, 1000));

listenPassword();
}

async function listenPassword(){

 let password=await listen(7000);

 if(password){

  document.getElementById("password").value=password;

  await registerUser(password);

 }else{

  attempts++;

  if(attempts<3){

   await speak("Voice not clear. Please say your password again");

   listenPassword();

  }else{

   await speak("Voice not detected. Please type password manually");

   document.getElementById("manualBox").style.display="block";

  }

 }

}

async function registerUser(password){

 const userid=document.getElementById("userid").value;

 const userData={
  userid:userid,
  password:password
 };

 // CALL BACKEND TO REGISTER / LOGIN
const res = await fetch("https://ecommerce-backend-7c95.onrender.com/api/voice-register-login/", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    username: userid,   // your generated user id
    password: password  // password from voice or manual input
  })
});

const data = await res.json();
console.log("LOGIN RESPONSE:", data);

if(data.token){
  console.log("REAL TOKEN:", data.token);
  localStorage.setItem("talk2buy_token", data.token);

  await speak("Login successful");

  setTimeout(()=>{
    window.location.href = "./search.html"; // go to products page
  }, 1000);

}else{
  await speak("Login failed. Try again");
  alert(data.message || "Login failed");
}

}

async function manualRegister(){

 const password=document.getElementById("password").value;

 if(!password){
  alert("Please type password");
  return;
 }

 registerUser(password);

}

document.addEventListener("click", async () => {
  await startRegister();
}, { once: true });

</script>

</body>
</html>
