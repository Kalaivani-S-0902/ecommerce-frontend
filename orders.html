<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders - Talk2Buy</title>

<style>
body{
  background:#001f3f;
  color:white;
  font-family:Arial;
  padding:20px;
}

h2{
  text-align:center;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#001f3f;
  padding:15px 20px;
  border-radius:10px;
  border:2px solid yellow;
  margin-bottom:20px;
}

.nav-left a{
  color:yellow;
  text-decoration:none;
  margin-right:20px;
  font-weight:bold;
}

.nav-left a:hover{
  color:white;
}

.nav-right a{
  color:red;
  font-weight:bold;
  text-decoration:none;
}

.order{
  border:1px solid yellow;
  padding:15px;
  margin-bottom:20px;
  border-radius:10px;
  background:#003366;
}

.order-item{
  margin-left:15px;
}
</style>
</head>
<body>
<div class="navbar">

  <!-- LEFT -->
  <div class="nav-left">
    <a href="product.html">Products</a>
    <a href="cart.html">Cart</a>
    <a href="orders.html">Orders</a>
  </div>

  <!-- RIGHT -->
  <div class="nav-right">
    <a href="#" onclick="logout()">Logout</a>
  </div>

</div>
<h2>My Orders</h2>

<div id="orders"></div>

<script>
    
const token = localStorage.getItem("talk2buy_token");
if(!token){
  window.location.href = "login.html";
}
function speak(text){
  return new Promise(resolve=>{
    const msg = new SpeechSynthesisUtterance(text);
    msg.onend = resolve;
    speechSynthesis.speak(msg);
  });
}

function listen(timeout=6000){
  return new Promise(resolve=>{
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if(!SpeechRecognition){
      resolve("");
      return;
    }

    const rec = new SpeechRecognition();

    rec.lang = "en-US";
    rec.interimResults = false;
    rec.maxAlternatives = 1;
    rec.continuous = false;

    let finished = false;

    rec.onstart = () => {
      console.log("🎤 Mic started...");
    };

    rec.onresult = e => {
      finished = true;
      let text = e.results[0][0].transcript.toLowerCase();
      resolve(text);
    };

    rec.onerror = () => {
      if(!finished) resolve("");
    };

    rec.onend = () => {
      if(!finished) resolve("");
    };

    //  force mic start
    setTimeout(()=>{
      rec.start();
    }, 200);

    // auto stop
    setTimeout(()=>{
      if(!finished){
        rec.stop();
        resolve("");
      }
    }, timeout);
  });
}

async function loadOrders(){

  try{

    let res = await fetch("https://ecommerce-backend-7c95.onrender.com/api/orders/",{
      headers:{
        "Authorization": `Token ${token}`
      }
    });

    let data = await res.json();

    const container = document.getElementById("orders");
    container.innerHTML = "";

    if(!data.orders || data.orders.length === 0){
      container.innerHTML = "<p>No previous orders.</p>";
      await speak("You have no previous orders.");
      return;
    }

   await speak(`You have ${data.orders.length} previous orders.`);

//  SHOW UI FIRST
for(let order of data.orders){

  let orderDiv = document.createElement("div");
  orderDiv.className = "order";

  orderDiv.innerHTML = `
    <h3>Order ID: ${order.id}</h3>
    <p>Total Price: ₹${order.total_price}</p>
    <p>Date: ${order.created_at}</p>
    <div id="items-${order.id}"></div>
  `;

  container.appendChild(orderDiv);

  let itemsContainer = document.getElementById(`items-${order.id}`);

  for(let item of order.items){
    itemsContainer.innerHTML += `
      <div class="order-item">
        <img src="${item.image}" width="120"><br>
        <p><strong>${item.product_name}</strong></p>
        <p>Quantity: ${item.quantity}</p>
        <p>Color: ${item.color || "N/A"}</p>
        <p>Size: ${item.size || "N/A"}</p>
        <p>Brand: ${item.brand || "N/A"}</p>
      </div>
    `;
  }
}

//  ASK AFTER UI
await speak("Do you want me to explain your orders? Say yes or no");
await speak("Listening now");

// small delay
await new Promise(r => setTimeout(r, 800));

let answer = await listen();

//  IF YES → EXPLAIN
if(answer.includes("yes")){

  for(let order of data.orders){

    await speak(`Order ${order.id} placed on ${order.created_at}`);
    await speak(`Total price ${order.total_price} rupees`);

    let count = 1;

    for(let item of order.items){

      await speak(item.product_name);
      await speak(`Quantity ${item.quantity}`);

      if(item.color) await speak(`Color ${item.color}`);
      if(item.size) await speak(`Size ${item.size}`);
      if(item.brand) await speak(`Brand ${item.brand}`);

      //  product explained
     await speak(`Product ${count} is explained`);

//  ASK USER
await speak("Should I move to next product or skip? Say next or skip");

// delay
await new Promise(r => setTimeout(r, 800));

// listen
let nextAction = await listen();

//  HANDLE RESPONSE
if(nextAction.includes("skip")){
  await speak("Skipping and redirecting to location page");
  window.location.href = "location.html";
  return;
}

// if user says next / yes → continue
// if no response → also continue
if(nextAction.includes("next") || nextAction.includes("yes") || nextAction === ""){
  count++;
  continue;
}

// fallback (unknown response)
count++;
    }
  }

  await speak("All products explained. Redirecting to location page");
  window.location.href = "location.html";

}else{
  await speak("Redirecting to location page");
  window.location.href = "location.html";
}

  }catch(error){
    console.log("Orders error:", error);
  }
}

loadOrders();
function logout(){
  localStorage.removeItem("talk2buy_token");
  alert("Logged out successfully");
  window.location.href = "login.html";
}
</script>

</body>
</html>
